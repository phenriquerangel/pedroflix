# =============================================================
# PersistentVolumes — todos pinados ao node worker (role=media)
# Base path no host: /run/media/pedro/Nvme_1TB/pedroflix/
# Disponível dentro do node como: /mnt/pedroflix/
# =============================================================

# --- Volume compartilhado de mídia (filmes + séries) ---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-media
spec:
  capacity:
    storage: 250Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: pedroflix-local
  hostPath:
    path: /mnt/pedroflix/media
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: role
              operator: In
              values:
                - media
---
# --- Volume compartilhado de downloads ---
apiVersion: v1
