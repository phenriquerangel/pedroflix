# =============================================================
# Comunicação interna via DNS do cluster:
#   <serviço>.pedroflix.svc.cluster.local
#
# Jellyfin      → jellyfin.pedroflix.svc.cluster.local:8096
# Radarr        → radarr.pedroflix.svc.cluster.local:7878
# Sonarr        → sonarr.pedroflix.svc.cluster.local:8989
# Prowlarr      → prowlarr.pedroflix.svc.cluster.local:9696
# Bazarr        → bazarr.pedroflix.svc.cluster.local:6767
# qBittorrent   → qbittorrent.pedroflix.svc.cluster.local:8080
# FlareSolverr  → flaresolverr.pedroflix.svc.cluster.local:8191
# =============================================================

apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: pedroflix
  labels:
    app: jellyfin
spec:
  selector:
    app: jellyfin
  ports:
    - name: http
      port: 8096
      targetPort: 8096
      nodePort: 30096
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: pedroflix
  labels:
    app: radarr
spec:
  selector:
    app: radarr
  ports:
    - name: http
      port: 7878
      targetPort: 7878
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: pedroflix
  labels:
    app: sonarr
spec:
  selector:
    app: sonarr
  ports:
    - name: http
      port: 8989
      targetPort: 8989
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: prowlarr
  namespace: pedroflix
  labels:
    app: prowlarr
spec:
  selector:
    app: prowlarr
  ports:
    - name: http
      port: 9696
      targetPort: 9696
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: bazarr
  namespace: pedroflix
  labels:
    app: bazarr
spec:
  selector:
    app: bazarr
  ports:
    - name: http
      port: 6767
      targetPort: 6767
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: pedroflix
  labels:
    app: qbittorrent
spec:
  selector:
    app: qbittorrent
  ports:
    - name: webui
      port: 8080
      targetPort: 8080
    - name: torrent-tcp
      port: 6881
      targetPort: 6881
      protocol: TCP
    - name: torrent-udp
      port: 6881
      targetPort: 6881
      protocol: UDP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: pedroflix
  labels:
    app: flaresolverr
spec:
  selector:
    app: flaresolverr
  ports:
    - name: http
      port: 8191
      targetPort: 8191
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: pedroflix-web
  namespace: pedroflix
  labels:
    app: pedroflix-web
spec:
  selector:
    app: pedroflix-web
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  type: ClusterIP
