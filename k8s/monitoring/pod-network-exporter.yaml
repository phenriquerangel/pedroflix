apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-network-exporter
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-network-exporter
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-network-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pod-network-exporter
subjects:
  - kind: ServiceAccount
    name: pod-network-exporter
    namespace: monitoring
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: pod-network-exporter
  namespace: monitoring
  labels:
    app: pod-network-exporter
spec:
  selector:
    matchLabels:
      app: pod-network-exporter
  template:
    metadata:
      labels:
        app: pod-network-exporter
    spec:
      serviceAccountName: pod-network-exporter
      hostPID: true
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: dedicated
          operator: Equal
          value: media
          effect: NoSchedule
      containers:
        - name: exporter
          image: pod-network-exporter:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9099
              name: metrics
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: PORT
              value: "9099"
          resources:
            requests:
              cpu: "5m"
              memory: "20Mi"
            limits:
              cpu: "50m"
              memory: "50Mi"
          securityContext:
            privileged: true
          volumeMounts:
            - name: proc
              mountPath: /proc
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9099
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: proc
          hostPath:
            path: /proc
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pod-network-exporter
  namespace: monitoring
  labels:
    app: pod-network-exporter
spec:
  selector:
    app: pod-network-exporter
  clusterIP: None
  ports:
    - name: metrics
      port: 9099
      targetPort: 9099
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pod-network-exporter
  namespace: monitoring
  labels:
    release: kube-prometheus
spec:
  selector:
    matchLabels:
      app: pod-network-exporter
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      honorLabels: true
      relabelings:
        - action: replace
          sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: scrape_node
