## Custom recording rules to work around minikube docker-in-docker cgroup issue.
## The kubelet's built-in cAdvisor doesn't populate the 'container' label in this environment.
## These rules use pod-level metrics and synthesize a 'container' label = pod name,
## which satisfies the kube-prometheus-stack dashboards.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: minikube-fix-recording-rules
  namespace: monitoring
  labels:
    release: kube-prometheus
spec:
  groups:
    - name: k8s.rules.container_cpu_usage_minikube
      interval: 60s
      rules:
        - record: node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate
          expr: |
            sum by (namespace, pod, node) (
              irate(container_cpu_usage_seconds_total{job="kubelet", pod!="", container=""}[5m])
            )
            * on (namespace, pod) group_left(node)
            max by(namespace, pod, node) (kube_pod_info{node!=""})

    - name: k8s.rules.container_memory_minikube
      interval: 60s
      rules:
        - record: node_namespace_pod_container:container_memory_working_set_bytes
          expr: |
            container_memory_working_set_bytes{job="kubelet", pod!="", container=""}
            * on (namespace, pod) group_left(node)
            max by(namespace, pod, node) (kube_pod_info{node!=""})

        - record: node_namespace_pod_container:container_memory_rss
          expr: |
            container_memory_rss{job="kubelet", pod!="", container=""}
            * on (namespace, pod) group_left(node)
            max by(namespace, pod, node) (kube_pod_info{node!=""})

        - record: node_namespace_pod_container:container_memory_cache
          expr: |
            container_memory_cache{job="kubelet", pod!="", container=""}
            * on (namespace, pod) group_left(node)
            max by(namespace, pod, node) (kube_pod_info{node!=""})

        - record: node_namespace_pod_container:container_memory_swap
          expr: |
            container_memory_swap{job="kubelet", pod!="", container=""}
            * on (namespace, pod) group_left(node)
            max by(namespace, pod, node) (kube_pod_info{node!=""})

    - name: k8s.rules.pod_owner_minikube
      interval: 60s
      rules:
        - record: namespace_workload_pod:kube_pod_owner:relabel
          expr: |
            max by (cluster, namespace, workload, pod) (
              label_replace(
                label_replace(
                  kube_pod_owner{owner_kind="ReplicaSet"},
                  "replicaset", "$1", "owner_name", "(.*)"
                ) * on(replicaset, namespace) group_left(owner_name, owner_kind)
                topk by(replicaset, namespace) (
                  1,
                  max by (replicaset, namespace, owner_name, owner_kind) (
                    kube_replicaset_owner{owner_kind=~"Deployment|StatefulSet"}
                  )
                ),
                "workload", "$1", "owner_name", "(.*)"
              )
            )
            or
            max by (cluster, namespace, workload, pod) (
              label_replace(
                kube_pod_owner{owner_kind="DaemonSet"},
                "workload", "$1", "owner_name", "(.*)"
              )
            )
            or
            max by (cluster, namespace, workload, pod) (
              label_replace(
                kube_pod_owner{owner_kind="StatefulSet"},
                "workload", "$1", "owner_name", "(.*)"
              )
            )
            or
            max by (cluster, namespace, workload, pod) (
              label_replace(
                kube_pod_owner{owner_kind="Job"},
                "workload", "$1", "owner_name", "(.*)"
              )
            )

        - record: namespace_workload_pod:kube_pod_owner:relabel
          labels:
            workload_type: deployment
          expr: |
            max by (namespace, workload, pod) (
              label_replace(
                kube_pod_owner{owner_kind="ReplicaSet"},
                "workload", "$1", "owner_name", "(.*)"
              )
            )
