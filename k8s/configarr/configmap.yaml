apiVersion: v1
kind: ConfigMap
metadata:
  name: configarr-config
  namespace: pedroflix
data:
  config.yml: |
    trashGuideUrl: https://github.com/TRaSH-Guides/Guides
    recyclarrConfigUrl: https://github.com/recyclarr/config-templates

    customFormatDefinitions:
      - trash_id: language-prefer-portuguese
        trash_description: "Language: Prefer Portuguese"
        name: "Language: Prefer Portuguese"
        includeCustomFormatWhenRenaming: false
        specifications:
          - name: Portuguese
            implementation: LanguageSpecification
            negate: false
            required: false
            fields:
              value: 18
          - name: Portuguese Brazil
            implementation: LanguageSpecification
            negate: false
            required: false
            fields:
              value: 33
          - name: Release Title Portuguese
            implementation: ReleaseTitleSpecification
            negate: false
            required: false
            fields:
              value: "(?i)\\b(pt[-_]br|ptbr|dublado|dual[-_]audio|multi[-_]audio|portugues|portuguese)\\b"

    sonarr:
      main:
        base_url: http://sonarr.pedroflix.svc.cluster.local:8989
        api_key: !secret sonarr_api_key

        include:
          - template: sonarr-quality-definition-series
          - template: sonarr-v4-quality-profile-web-1080p
          - template: sonarr-v4-custom-formats-web-1080p

        custom_formats:
          - trash_ids:
              - language-prefer-portuguese
            assign_scores_to:
              - name: Any
                score: 1000
              - name: SD
                score: 1000
              - name: HD-720p
                score: 1000
              - name: HD-1080p
                score: 1000
              - name: Ultra-HD
                score: 1000
              - name: HD - 720p/1080p
                score: 1000
              - name: WEB-1080p
                score: 1000

    radarr:
      main:
        base_url: http://radarr.pedroflix.svc.cluster.local:7878
        api_key: !secret radarr_api_key

        include:
          - template: radarr-quality-definition-movie
          - template: radarr-quality-profile-hd-bluray-web
          - template: radarr-custom-formats-hd-bluray-web

        custom_formats:
          - trash_ids:
              - language-prefer-portuguese
            assign_scores_to:
              - name: Any
                score: 1000
              - name: SD
                score: 1000
              - name: HD-720p
                score: 1000
              - name: HD-1080p
                score: 1000
              - name: Ultra-HD
                score: 1000
              - name: HD - 720p/1080p
                score: 1000
              - name: HD Bluray + WEB
                score: 1000
